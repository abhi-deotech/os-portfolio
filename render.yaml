services:
  - type: static
    name: os-portfolio
    env: static
    buildCommand: npm run build
    staticPublishDir: dist
    autoDeploy: true
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: cross-origin

